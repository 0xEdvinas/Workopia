services:
  web:
    build: .
    container_name: workopia_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: workopia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: workopia
      MYSQL_USER: workopia_user
      MYSQL_PASSWORD: workopia_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - workopia_mysql_data:/var/lib/mysql

volumes:
  workopia_mysql_data:
